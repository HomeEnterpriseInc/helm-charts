{{- if .Values.ntfy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "alfred.fullname" . }}-ntfy
  labels:
    {{- include "alfred.labels" . | nindent 4 }}
    app.kubernetes.io/component: ntfy
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "alfred.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ntfy
  template:
    metadata:
      labels:
        {{- include "alfred.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ntfy
    spec:
      containers:
        - name: ntfy
          image: "{{ .Values.ntfy.image.repository }}:{{ .Values.ntfy.image.tag }}"
          args:
            - serve
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: NTFY_BASE_URL
              value: "http://localhost"
            - name: NTFY_UPSTREAM_BASE_URL
              value: ""
            # Self-hosted: no FCM/APNS
            - name: NTFY_FIREBASE_KEY_FILE
              value: ""
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: ntfy-cache
              mountPath: /var/cache/ntfy
      volumes:
        - name: ntfy-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "alfred.fullname" . }}-ntfy
  labels:
    {{- include "alfred.labels" . | nindent 4 }}
    app.kubernetes.io/component: ntfy
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.ntfy.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "alfred.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ntfy
{{- end }}
