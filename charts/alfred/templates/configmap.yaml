apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "alfred.fullname" . }}-config
  labels:
    {{- include "alfred.labels" . | nindent 4 }}
data:
  alfred.yaml: |
    database:
      postgres_url: "postgresql://{{ .Values.postgresql.auth.username }}:$(POSTGRES_PASSWORD)@{{ include "alfred.postgresql.host" . }}:{{ .Values.postgresql.service.port }}/{{ .Values.postgresql.auth.database }}"
      redis_url: "redis://:$(REDIS_PASSWORD)@{{ include "alfred.redis.host" . }}:{{ .Values.redis.service.port }}/0"
      rabbitmq_url: "amqp://{{ .Values.rabbitmq.auth.username }}:$(RABBITMQ_PASSWORD)@{{ include "alfred.rabbitmq.host" . }}:{{ .Values.rabbitmq.service.amqpPort }}/"
      mongo_url: "mongodb://alfred:$(MONGODB_PASSWORD)@{{ include "alfred.fullname" . }}-mongodb:27017/alfred"

    services:
      matrix_homeserver: "http://{{ include "alfred.dendrite.host" . }}:{{ .Values.dendrite.service.port }}"
      ntfy_url: "http://{{ include "alfred.fullname" . }}-ntfy:{{ .Values.ntfy.service.port }}"
      claude_api_url: "https://api.anthropic.com"

    vault:
      master_key_env: "VAULT_MASTER_KEY"

    http_api:
      host: "0.0.0.0"
      port: 8080
