# =============================================================================
# Persistent Volume Claims
# =============================================================================

# Alfred application data
{{- if .Values.alfred.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "alfred.fullname" . }}-data
  labels:
    {{- include "alfred.labels" . | nindent 4 }}
    app.kubernetes.io/component: alfred
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.alfred.persistence.size }}
  {{- if .Values.alfred.persistence.storageClass }}
  storageClassName: {{ .Values.alfred.persistence.storageClass | quote }}
  {{- end }}
{{- end }}
