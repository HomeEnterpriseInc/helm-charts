apiVersion: v1
kind: Secret
metadata:
  name: {{ include "alfred.fullname" . }}-secrets
  labels:
    {{- include "alfred.labels" . | nindent 4 }}
type: Opaque
stringData:
  # ===========================================================================
  # REQUIRED — Alfred will not start without these
  # ===========================================================================

  # Anthropic API key for Claude (powers all AI reasoning)
  anthropic-api-key: {{ required "secrets.anthropicApiKey is required" .Values.secrets.anthropicApiKey | quote }}

  # AES-256 encryption key for Vault PII storage (64-char hex string)
  vault-master-key: {{ required "secrets.vaultMasterKey is required" .Values.secrets.vaultMasterKey | quote }}

  # Database passwords — required for core infrastructure
  postgres-password: {{ required "secrets.postgresPassword is required" .Values.secrets.postgresPassword | quote }}
  redis-password: {{ required "secrets.redisPassword is required" .Values.secrets.redisPassword | quote }}
  rabbitmq-password: {{ required "secrets.rabbitmqPassword is required" .Values.secrets.rabbitmqPassword | quote }}

  # Matrix/Dendrite credentials — required for chat interface
  matrix-bot-password: {{ required "secrets.matrixBotPassword is required" .Values.secrets.matrixBotPassword | quote }}
  matrix-access-token: {{ required "secrets.matrixAccessToken is required" .Values.secrets.matrixAccessToken | quote }}

  # ===========================================================================
  # OPTIONAL — needed for specific features, can be added later
  # Alfred can ask the principal for these via chat and self-configure
  # ===========================================================================

  {{- if .Values.secrets.mongodbPassword }}
  # MongoDB password (needed for: document storage plugins)
  mongodb-password: {{ .Values.secrets.mongodbPassword | quote }}
  {{- end }}

  {{- if .Values.secrets.track17ApiKey }}
  # 17track API key (needed for: parcel_tracker plugin)
  track17-api-key: {{ .Values.secrets.track17ApiKey | quote }}
  {{- end }}

  {{- if .Values.secrets.kiwiApiKey }}
  # Kiwi.com API key (needed for: flight_hunter plugin)
  kiwi-api-key: {{ .Values.secrets.kiwiApiKey | quote }}
  {{- end }}

  {{- if .Values.secrets.memmachineApiKey }}
  # memmachine.ai API key (needed for: persistent memory)
  memmachine-api-key: {{ .Values.secrets.memmachineApiKey | quote }}
  {{- end }}
